<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tacos Milo 🌮</title>

<style>
body{background:black;color:white;font-family:Arial;text-align:center;}
.card{background:#222;padding:15px;border-radius:10px;width:180px;}
button{padding:8px;border:none;border-radius:8px;cursor:pointer;margin:3px;}
select{padding:5px;border-radius:5px;margin-top:5px;}

#formulario,#pantallaPago{
display:none;position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.9);justify-content:center;align-items:center;
}

.box{background:#333;padding:20px;border-radius:15px;width:90%;max-width:320px;}

.admin{display:none;}

#panelAdmin{
position:fixed;top:10px;right:10px;background:#111;
padding:10px;border-radius:10px;max-height:85vh;overflow:auto;
}
</style>

<script>

let carrito=[];

// 🔥 CONTRASEÑA ADMIN
let adminPass="1234";
let admin=false;

// 🔥 PRECIOS
let precios={
"Pastor":18,"Chorizo":18,"Bistec":18,"Suadero":18,"Tripa":24,
"Volcán":30,"Quesadilla sencilla":25,"Quesadilla con carne":35,
"Lonche":50,"Gringa":40,"Agua":25,"Coca":24
};

// ================= ADMIN =================
function activarAdmin(){
let p=prompt("Contraseña admin:");
if(p===adminPass){
admin=true;
document.querySelectorAll(".admin").forEach(e=>e.style.display="block");
alert("Admin activado");
}else alert("Incorrecto");
}

function cambiarPassword(){
let n=prompt("Nueva contraseña:");
if(n) adminPass=n;
}

// ================= AGUAS =================
let aguas=["Jamaica","Horchata","Limón","Fresa","Guayaba"];

function renderAguas(){
let s=document.getElementById("saborAgua");
s.innerHTML="";
aguas.forEach(a=>{
s.innerHTML+=`<option>${a}</option>`;
});
}

function agregarAguaAdmin(){
let n=prompt("Nuevo sabor de agua:");
if(n){aguas.push(n);renderAguas();}
}

function quitarAgua(a){
aguas=aguas.filter(x=>x!==a);
renderAguas();
}

// ================= CARRITO =================
function agregar(p){carrito.push(p);actualizar();}

function agregarConCarne(tipo,id){
let c=document.getElementById(id).value;
carrito.push(tipo+" de "+c);
actualizar();
}

function quitar(p){
let i=carrito.indexOf(p);
if(i>-1) carrito.splice(i,1);
actualizar();
}

// ================= ACTUALIZAR =================
function actualizar(){
let lista=document.getElementById("lista");
let total=0;
let cont={};
lista.innerHTML="";

carrito.forEach(x=>cont[x]=(cont[x]||0)+1);

for(let x in cont){
let base=x.includes("Agua")?"Agua":x.split(" de ")[0];
let precio=precios[base]*cont[x];
total+=precio;

lista.innerHTML+=`
${cont[x]} ${x} - $${precio}
<button onclick="quitar('${x}')">❌</button><br>
`;
}

document.getElementById("total").innerText="Total: $"+total;
}

// ================= FORM =================
function abrirForm(){
if(carrito.length==0){alert("Agrega algo");return;}
document.getElementById("formulario").style.display="flex";
}

function tipoCambio(){
document.getElementById("hora").style.display=
(document.getElementById("tipo").value==="Para comer aquí")?"block":"none";
}

function enviar(){
let n=document.getElementById("nombre").value;
if(!n){alert("Nombre obligatorio");return;}
document.getElementById("formulario").style.display="none";
document.getElementById("pantallaPago").style.display="flex";
}

// ================= CANCELAR =================
function cancelarPedido(){
if(confirm("¿Cancelar pedido?")){
carrito=[];
actualizar();
document.getElementById("formulario").style.display="none";
document.getElementById("pantallaPago").style.display="none";
}
}

// ================= CONFIRMAR =================
function confirmarPedido(){

let n=document.getElementById("nombre").value;
let ref=document.getElementById("ref").value;

if(!ref){alert("Referencia obligatoria");return;}

let txt="🌮 TACOS MILO\n\nCliente: "+n+"\n\nPedido:\n";

carrito.forEach(x=>txt+="- "+x+"\n");

window.open("https://wa.me/5213321310169?text="+encodeURIComponent(txt));
}

// ================= INIT =================
window.onload=function(){
renderAguas();
}

</script>
</head>

<body>

<h1>🌮 TACOS MILO</h1>

<div id="lista"></div>
<h2 id="total">Total: $0</h2>

<hr>

<!-- PRODUCTOS CON IMÁGENES -->
<div style="display:flex;flex-wrap:wrap;justify-content:center;gap:15px;">

<div class="card"><h3>Pastor</h3><img src="pastor.jpg" width="120"><br><button onclick="agregar('Pastor')">Agregar</button></div>
<div class="card"><h3>Chorizo</h3><img src="chorizo.jpg" width="120"><br><button onclick="agregar('Chorizo')">Agregar</button></div>
<div class="card"><h3>Bistec</h3><img src="bistec.jpg" width="120"><br><button onclick="agregar('Bistec')">Agregar</button></div>

<div class="card">
<h3>Volcán</h3>
<img src="volcan.jpg" width="120"><br>
<select id="v">
<option>Pastor</option><option>Chorizo</option><option>Bistec</option><option>Suadero</option>
</select>
<button onclick="agregarConCarne('Volcán','v')">Agregar</button>
</div>

<div class="card">
<h3>Gringa</h3>
<img src="gringa.jpg" width="120"><br>
<select id="g">
<option>Pastor</option><option>Chorizo</option><option>Bistec</option>
</select>
<button onclick="agregarConCarne('Gringa','g')">Agregar</button>
</div>

<div class="card">
<h3>Lonche</h3>
<img src="lonche.jpg" width="120"><br>
<select id="l">
<option>Pastor</option><option>Chorizo</option><option>Bistec</option>
</select>
<button onclick="agregarConCarne('Lonche','l')">Agregar</button>
</div>

<div class="card">
<h3>Agua</h3>
<img src="agua.jpg" width="120"><br>
<select id="saborAgua"></select>
<button onclick="agregar('Agua')">Agregar</button>
</div>

<div class="card">
<h3>Coca</h3>
<img src="coca.jpg" width="120"><br>
<button onclick="agregar('Coca')">Agregar</button>
</div>

</div>

<br>

<button onclick="abrirForm()" style="background:green;color:white;font-size:18px;">
Terminar ✔️
</button>

<button onclick="cancelarPedido()" style="background:red;color:white;font-size:18px;">
Cancelar ❌
</button>

<button onclick="activarAdmin()" style="position:fixed;bottom:10px;right:10px;">⚙️</button>

<!-- FORM -->
<div id="formulario">
<div class="box">

<input id="nombre" placeholder="Nombre">

<select id="tipo" onchange="tipoCambio()">
<option>Para llevar</option>
<option>Para comer aquí</option>
</select>

<input id="hora" type="time" style="display:none;">

<button onclick="enviar()">Continuar</button>

</div>
</div>

<!-- PAGO -->
<div id="pantallaPago">
<div class="box">

<h3>Transferencia</h3>

<input id="ref" placeholder="Referencia">

<button onclick="confirmarPedido()">Enviar</button>

</div>
</div>

<!-- ADMIN -->
<div id="panelAdmin" class="admin">

<h3>ADMIN</h3>

<button onclick="cambiarPassword()">Cambiar contraseña</button>
<button onclick="agregarAguaAdmin()">Agregar agua</button>

</div>

</body>
</html>
