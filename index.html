<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tacos Milo 🌮</title>

<style>
body {background:black;color:white;font-family:Arial;text-align:center;}
.card {background:#222;padding:15px;border-radius:10px;width:180px;}
button {padding:8px;border:none;border-radius:8px;cursor:pointer;margin:3px;}
select {margin-top:5px;padding:5px;border-radius:5px;}
.admin {display:none;}

#formulario, #pantallaPago {
display:none;position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.9);justify-content:center;align-items:center;
}

.box {background:#333;padding:20px;border-radius:15px;width:90%;max-width:320px;}
input {width:90%;padding:10px;margin:10px;border-radius:8px;border:none;}
</style>

<script>
let carrito=[];

let precios={
"Pastor":18,"Chorizo":18,"Bistec":18,"Suadero":18,"Tripa":24,
"Volcán":30,"Quesadilla sencilla":25,"Quesadilla con carne":35,
"Lonche":50,"Gringa":40,"Agua":25,"Coca":24
};

// AGUAS
let aguas = JSON.parse(localStorage.getItem("aguas")) || {
Jamaica:true,Horchata:true,Limón:true
};

function guardarAguas(){
localStorage.setItem("aguas", JSON.stringify(aguas));
}

// ADMIN
let admin=false;

function activarAdmin(){
let pass=prompt("Contraseña:");
if(pass==="1234"){
admin=true;
document.querySelectorAll(".admin").forEach(e=>e.style.display="block");
actualizarSabores();
}
}

// SABORES
function actualizarSabores(){
let select=document.getElementById("saborAgua");
select.innerHTML="";

for(let s in aguas){
if(aguas[s]) select.innerHTML+=`<option>${s}</option>`;
}

let adminDiv=document.getElementById("adminAguas");
adminDiv.innerHTML="";

if(admin){
for(let s in aguas){
adminDiv.innerHTML+=`${s}
<button onclick="toggleAgua('${s}')">${aguas[s]?"❌":"✔️"}</button><br>`;
}
}
}

function toggleAgua(n){
aguas[n]=!aguas[n];
guardarAguas();
actualizarSabores();
}

// CARRITO
function agregar(p){carrito.push(p);actualizar();}
function agregarConCarne(t,id){
let c=document.getElementById(id).value;
carrito.push(t+" de "+c);
actualizar();
}
function agregarAgua(){
let s=document.getElementById("saborAgua").value;
carrito.push("Agua de "+s);
actualizar();
}
function quitar(p){
let i=carrito.indexOf(p);
if(i!=-1) carrito.splice(i,1);
actualizar();
}

function actualizar(){
let lista=document.getElementById("lista");
let total=0,cont={};
lista.innerHTML="";

carrito.forEach(x=>cont[x]=(cont[x]||0)+1);

for(let x in cont){
let base=x.includes("Agua")?"Agua":x.split(" de ")[0];
let precio=precios[base]*cont[x];
total+=precio;

lista.innerHTML+=`${cont[x]} ${x} - $${precio}
<button onclick="quitar('${x}')">❌</button><br>`;
}

document.getElementById("total").innerText="Total: $"+total;
}

// FORM
function abrirForm(){
if(carrito.length==0){alert("No has pedido nada");return;}
document.getElementById("formulario").style.display="flex";
}

function tipoCambio(){
let t=document.getElementById("tipo").value;
document.getElementById("hora").style.display=(t=="Para comer aquí")?"block":"none";
}

// PASO A PAGO
function enviar(){
let nombre=document.getElementById("nombre").value;
let tipo=document.getElementById("tipo").value;
let hora=document.getElementById("hora").value;

if(!nombre){alert("Pon tu nombre");return;}
if(tipo=="Para comer aquí" && !hora){alert("Pon hora");return;}

localStorage.setItem("nombre", nombre);
localStorage.setItem("tipo", tipo);
localStorage.setItem("hora", hora);

document.getElementById("formulario").style.display="none";
document.getElementById("pantallaPago").style.display="flex";
}

// CONFIRMAR PEDIDO
function confirmarPedido(){
let nombre=localStorage.getItem("nombre");
let tipo=localStorage.getItem("tipo");
let hora=localStorage.getItem("hora");

let cont={},total=0;
carrito.forEach(x=>cont[x]=(cont[x]||0)+1);

let txt="🌮 TACOS MILO\n\nCliente: "+nombre+"\nTipo: "+tipo+"\n";

if(tipo=="Para comer aquí") txt+="Hora: "+hora+"\n";

txt+="\nPago: Transferencia\n\nPedido:\n";

for(let x in cont){
let base=x.includes("Agua")?"Agua":x.split(" de ")[0];
let precio=precios[base]*cont[x];
total+=precio;

txt+="- "+cont[x]+" "+x+" ($"+precio+")\n";
}

txt+="\nTotal: $"+total;

window.open("https://wa.me/5213321310169?text="+encodeURIComponent(txt));
}

// INIT
window.onload=actualizarSabores;
</script>
</head>

<body>

<h1 style="color:yellow;">🌮 TACOS MILO</h1>

<div id="lista"></div>
<h2 id="total">Total: $0</h2>

<hr>

<div style="display:flex;flex-wrap:wrap;justify-content:center;gap:15px;">

<!-- TACOS -->
<div class="card"><h3>Pastor</h3><img src="pastor.jpg" width="120"><br><button onclick="agregar('Pastor')">Agregar</button></div>
<div class="card"><h3>Chorizo</h3><img src="chorizo.jpg" width="120"><br><button onclick="agregar('Chorizo')">Agregar</button></div>
<div class="card"><h3>Bistec</h3><img src="bistec.jpg" width="120"><br><button onclick="agregar('Bistec')">Agregar</button></div>

<!-- GRINGA -->
<div class="card">
<h3>Gringa</h3>
<img src="gringa.jpg" width="120"><br>
<select id="carneGringa">
<option>Pastor</option><option>Chorizo</option><option>Bistec</option><option>Suadero</option><option>Tripa</option>
</select><br>
<button onclick="agregarConCarne('Gringa','carneGringa')">Agregar</button>
</div>

<!-- AGUA -->
<div class="card">
<h3>Agua</h3>
<img src="agua.jpg" width="120"><br>
<select id="saborAgua"></select><br>
<button onclick="agregarAgua()">Agregar</button>
<div id="adminAguas" class="admin"></div>
</div>

</div>

<br><br>
<button onclick="abrirForm()" style="background:green;color:white;font-size:18px;">
Terminar pedido ✔️
</button>

<button onclick="activarAdmin()" style="position:fixed;bottom:10px;right:10px;">⚙️</button>

<!-- FORM -->
<div id="formulario">
<div class="box">
<input id="nombre" placeholder="Tu nombre">
<select id="tipo" onchange="tipoCambio()">
<option>Para llevar</option>
<option>Para comer aquí</option>
</select>
<input id="hora" type="time" style="display:none;">
<button onclick="enviar()">Continuar</button>
</div>
</div>

<!-- PAGO -->
<div id="pantallaPago">
<div class="box">

<h2>💸 Pago por transferencia</h2>

<img src="qr.png" width="200"><br><br>

<p>Banco: BBVA</p>
<p>CLABE: 123456789012345678</p>
<p>Nombre: Tacos Milo</p>

<p style="color:orange;">⚠️ Paga y luego confirma</p>

<button onclick="confirmarPedido()" style="background:green;color:white;">
Ya pagué / Confirmar pedido
</button>

<br><br>
<button onclick="document.getElementById('pantallaPago').style.display='none'">
Cancelar
</button>

</div>
</div>

</body>
</html>
