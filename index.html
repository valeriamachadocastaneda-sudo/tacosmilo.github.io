<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tacos Milo 🌮</title>

<style>
body{background:black;color:white;font-family:Arial;text-align:center;}
.card{background:#222;padding:15px;border-radius:10px;width:180px;}
button{padding:8px;border:none;border-radius:8px;cursor:pointer;margin:3px;}
select{margin-top:5px;padding:5px;border-radius:5px;}

#formulario,#pantallaPago{
display:none;position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.9);justify-content:center;align-items:center;
}

.box{background:#333;padding:20px;border-radius:15px;width:90%;max-width:320px;}

.admin{display:none;}

#panelProductos{
position:fixed;top:10px;right:10px;background:#111;
padding:10px;border-radius:10px;max-height:85vh;overflow:auto;
}
</style>

<script>

let carrito=[];

// 🔥 PRECIOS
let precios={
"Pastor":18,"Chorizo":18,"Bistec":18,"Suadero":18,"Tripa":24,
"Volcán":30,"Quesadilla sencilla":25,"Quesadilla con carne":35,
"Lonche":50,"Gringa":40,"Agua":25,"Coca":24
};

// 🔥 PROMO 2x1
let promoActiva=true;
let promoProducto="Pastor";

// ================= AGUAS =================
let aguas=JSON.parse(localStorage.getItem("aguas"))||{
Jamaica:true,Horchata:true,Limón:true
};

function guardarAguas(){
localStorage.setItem("aguas",JSON.stringify(aguas));
}

function actualizarSabores(){
let s=document.getElementById("saborAgua");
s.innerHTML="";
for(let a in aguas){
if(guasDisponibles(a)){
s.innerHTML+=`<option>${a}</option>`;
}
}

renderAdminAguas();
}

function guasDisponibles(a){
return aguas[a];
}

function agregarSabor(){
let n=document.getElementById("nuevoSabor").value;
if(!n) return;
aguas[n]=true;
guardarAguas();
actualizarSabores();
}

function eliminarSabor(a){
delete aguas[a];
guardarAguas();
actualizarSabores();
}

function toggleAgua(a){
aguas[a]=!aguas[a];
guardarAguas();
actualizarSabores();
}

// ================= PRODUCTOS =================
let productos={
Pastor:true,Chorizo:true,Bistec:true,Suadero:true,Tripa:true,
"Volcán":true,"Quesadilla sencilla":true,"Quesadilla con carne":true,
Lonche:true,Gringa:true,Agua:true,Coca:true
};

function toggleProducto(p){
productos[p]=!productos[p];
renderProductosAdmin();
ocultarProductos();
}

// ================= ADMIN =================
let admin=false;
let adminPass="1234";

function activarAdmin(){
let p=prompt("Contraseña:");
if(p===adminPass){
admin=true;
document.querySelectorAll(".admin").forEach(e=>e.style.display="block");
renderProductosAdmin();
actualizarSabores();
alert("Admin activo");
}
}

function cambiarPassword(){
let n=prompt("Nueva contraseña:");
if(n) adminPass=n;
}

// ================= PROMO =================
function togglePromo(){
promoActiva=!promoActiva;
alert("Promo 2x1: "+promoActiva);
}

// ================= CARRITO =================
function agregar(p){carrito.push(p);actualizar();}

function agregarConCarne(tipo,id){
let c=document.getElementById(id).value;
carrito.push(tipo+" de "+c);
actualizar();
}

function quitar(p){
let i=carrito.indexOf(p);
if(i>-1) carrito.splice(i,1);
actualizar();
}

// ================= TOTAL + 2x1 =================
function actualizar(){

let lista=document.getElementById("lista");
let total=0;
let cont={};
lista.innerHTML="";

carrito.forEach(x=>cont[x]=(cont[x]||0)+1);

for(let x in cont){

let base=x.includes("Agua")?"Agua":x.split(" de ")[0];
let cantidad=cont[x];

// 🔥 2x1
let cobrar=cantidad;
if(promoActiva && base===promoProducto){
cobrar=Math.ceil(cantidad/2);
}

let precio=precios[base]*cobrar;
total+=precio;

lista.innerHTML+=`
${cantidad} ${x} - $${precio}
<button onclick="quitar('${x}')">❌</button><br>
`;
}

document.getElementById("total").innerText="Total: $"+total;
}

// ================= FORM =================
function abrirForm(){
if(carrito.length==0){alert("Vacío");return;}
document.getElementById("formulario").style.display="flex";
}

function enviar(){
document.getElementById("formulario").style.display="none";
document.getElementById("pantallaPago").style.display="flex";
}

// ================= CONFIRMAR =================
function confirmarPedido(){

let nombre=document.getElementById("nombre").value;
let ref=document.getElementById("refPago").value;

// 🔥 VALIDACIÓN REFERENCIA
if(!/^[0-9]{6,12}$/.test(ref)){
alert("Referencia inválida (6 a 12 números)");
return;
}

let txt="🌮 TACOS MILO\nCliente: "+nombre+"\n\n";

carrito.forEach(x=>txt+="- "+x+"\n");

window.open("https://wa.me/5213321310169?text="+encodeURIComponent(txt));
}

// ================= ADMIN LISTAS =================
function renderProductosAdmin(){
let div=document.getElementById("listaAdmin");
div.innerHTML="";

for(let p in productos){
div.innerHTML+=`
${p}
<button onclick="toggleProducto('${p}')">
${productos[p]?"❌":"✔️"}
</button><br>`;
}
}

function renderAdminAguas(){
let div=document.getElementById("listaAguas");
div.innerHTML="";

for(let a in aguas){
div.innerHTML+=`
${a}
<button onclick="toggleAgua('${a}')">
${guasDisponibles(a)?"❌":"✔️"}
</button>
<button onclick="eliminarSabor('${a}')">🗑️</button><br>`;
}
}

// ================= INIT =================
window.onload=function(){
actualizarSabores();
}

</script>
</head>

<body>

<h1>🌮 TACOS MILO</h1>

<div id="lista"></div>
<h2 id="total">Total: $0</h2>

<hr>

<!-- PRODUCTOS -->
<div style="display:flex;flex-wrap:wrap;justify-content:center;gap:15px;">

<div class="card"><h3>Pastor</h3><button onclick="agregar('Pastor')">Agregar</button></div>
<div class="card"><h3>Chorizo</h3><button onclick="agregar('Chorizo')">Agregar</button></div>
<div class="card"><h3>Bistec</h3><button onclick="agregar('Bistec')">Agregar</button></div>
<div class="card"><h3>Tripa</h3><button onclick="agregar('Tripa')">Agregar</button></div>

<div class="card"><h3>Quesadilla sencilla</h3><button onclick="agregar('Quesadilla sencilla')">Agregar</button></div>
<div class="card"><h3>Quesadilla con carne</h3><button onclick="agregar('Quesadilla con carne')">Agregar</button></div>

<div class="card"><h3>Volcán</h3><button onclick="agregar('Volcán')">Agregar</button></div>
<div class="card"><h3>Gringa</h3><button onclick="agregar('Gringa')">Agregar</button></div>

<div class="card"><h3>Agua</h3>
<select id="saborAgua"></select>
<button onclick="agregar('Agua')">Agregar</button>
</div>

<div class="card"><h3>Coca</h3><button onclick="agregar('Coca')">Agregar</button></div>

</div>

<br>

<button onclick="abrirForm()" style="background:green;color:white;">Terminar ✔️</button>
<button onclick="activarAdmin()" style="position:fixed;bottom:10px;right:10px;">⚙️</button>

<!-- FORM -->
<div id="formulario">
<div class="box">
<input id="nombre" placeholder="Nombre">
<button onclick="enviar()">Continuar</button>
</div>
</div>

<!-- PAGO -->
<div id="pantallaPago">
<div class="box">
<h3>Transferencia</h3>

<input id="refPago" placeholder="Referencia 6-12 dígitos">

<button onclick="confirmarPedido()" style="background:green;color:white;">
Confirmar
</button>
</div>
</div>

<!-- ADMIN -->
<div id="panelProductos" class="admin">

<h3>ADMIN</h3>

<button onclick="cambiarPassword()">Cambiar contraseña</button>
<button onclick="togglePromo()">Activar/desactivar 2x1</button>

<hr>

<h4>Productos</h4>
<div id="listaAdmin"></div>

<hr>

<h4>Aguas</h4>
<input id="nuevoSabor" placeholder="Nuevo sabor">
<button onclick="agregarSabor()">Agregar agua</button>

<div id="listaAguas"></div>

</div>

</body>
</html>
