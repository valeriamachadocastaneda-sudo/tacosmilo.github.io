<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tacos Milo 🌮</title>

<style>
body{background:black;color:white;font-family:Arial;text-align:center;}
.card{background:#222;padding:15px;border-radius:10px;width:180px;}
button{padding:8px;border:none;border-radius:8px;cursor:pointer;margin:3px;}
select{padding:5px;border-radius:5px;margin-top:5px;}

#formulario,#pantallaPago{
display:none;position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.9);justify-content:center;align-items:center;
}

.box{background:#333;padding:20px;border-radius:15px;width:90%;max-width:320px;}

.admin{display:none;}

#panelAdmin{
position:fixed;top:10px;right:10px;background:#111;
padding:10px;border-radius:10px;max-height:85vh;overflow:auto;
}
</style>

<script>

let carrito=[];

// 🔥 CONTRASEÑA
let adminPass="1234";
let admin=false;

// 🔥 PRODUCTOS (TODO INCLUIDO)
let productos={
"Pastor":true,"Chorizo":true,"Bistec":true,"Suadero":true,"Tripa":true,
"Volcán":true,"Gringa":true,"Lonche":true,
"Quesadilla sencilla":true,"Quesadilla con carne":true
};

// 🔥 AGUAS
let aguas=["Jamaica","Horchata","Limón"];

// 🔥 PROMO
let promo="";

// ================= ADMIN =================
function activarAdmin(){
let p=prompt("Contraseña:");
if(p===adminPass){
admin=true;
document.querySelectorAll(".admin").forEach(e=>e.style.display="block");
renderAdmin();
renderAguas();
alert("Admin activado");
}else alert("Incorrecto");
}

function cambiarPassword(){
let n=prompt("Nueva contraseña:");
if(n) adminPass=n;
}

// ================= PRODUCTOS ADMIN =================
function toggleProducto(p){
productos[p]=!productos[p];
renderAdmin();
}

function agregarProducto(){
let p=prompt("Nombre del producto:");
if(p){productos[p]=true;renderAdmin();}
}

// ================= AGUAS =================
function agregarAgua(){
let a=prompt("Nuevo sabor de agua:");
if(a){aguas.push(a);renderAguas();}
}

function quitarAgua(a){
aguas=aguas.filter(x=>x!==a);
renderAguas();
}

function renderAguas(){
let s=document.getElementById("saborAgua");
if(s){
s.innerHTML="";
aguas.forEach(a=>{
s.innerHTML+=`<option>${a}</option>`;
});
}

let div=document.getElementById("adminAguas");
if(admin){
div.innerHTML="";
aguas.forEach(a=>{
div.innerHTML+=`
${a}
<button onclick="quitarAgua('${a}')">❌</button><br>`;
});
}
}

// ================= PROMO =================
function ponerPromo(){
promo=prompt("Promo del día:");
document.getElementById("promo").innerText=promo;
}

// ================= CARRITO =================
function agregar(p){carrito.push(p);actualizar();}

function agregarConCarne(tipo,id){
let c=document.getElementById(id).value;
carrito.push(tipo+" de "+c);
actualizar();
}

function quitar(p){
let i=carrito.indexOf(p);
if(i>-1) carrito.splice(i,1);
actualizar();
}

// ================= ACTUALIZAR =================
function actualizar(){
let lista=document.getElementById("lista");
let total=0;
let cont={};
lista.innerHTML="";

carrito.forEach(x=>cont[x]=(cont[x]||0)+1);

for(let x in cont){
let base=x.includes("Agua")?"Agua":x.split(" de ")[0];
let precio=20*cont[x];
total+=precio;

lista.innerHTML+=`
${cont[x]} ${x}
<button onclick="quitar('${x}')">❌</button><br>
`;
}

document.getElementById("total").innerText="Total: $"+total;
}

// ================= FORM =================
function abrirForm(){
if(carrito.length==0){alert("Vacío");return;}
document.getElementById("formulario").style.display="flex";
}

function enviar(){
document.getElementById("formulario").style.display="none";
document.getElementById("pantallaPago").style.display="flex";
}

// ================= CONFIRMAR =================
function confirmarPedido(){
let n=document.getElementById("nombre").value;

let txt="🌮 TACOS MILO\nCliente: "+n+"\n\n";

carrito.forEach(x=>txt+="- "+x+"\n");

window.open("https://wa.me/5213321310169?text="+encodeURIComponent(txt));
}

// ================= ADMIN PANEL =================
function renderAdmin(){

let div=document.getElementById("listaAdmin");
if(!admin) return;

div.innerHTML="";

// productos
for(let p in productos){
div.innerHTML+=`
${p}
<button onclick="toggleProducto('${p}')">
${productos[p]?"❌":"✔️"}
</button><br>`;
}
}

</script>
</head>

<body onload="renderAguas()">

<h1>🌮 TACOS MILO</h1>

<h3 id="promo"></h3>

<div id="lista"></div>
<h2 id="total">Total: $0</h2>

<hr>

<!-- MENU -->
<div style="display:flex;flex-wrap:wrap;justify-content:center;gap:15px;">

<div class="card"><h3>Pastor</h3><button onclick="agregar('Pastor')">Agregar</button></div>
<div class="card"><h3>Chorizo</h3><button onclick="agregar('Chorizo')">Agregar</button></div>
<div class="card"><h3>Bistec</h3><button onclick="agregar('Bistec')">Agregar</button></div>
<div class="card"><h3>Tripa</h3><button onclick="agregar('Tripa')">Agregar</button></div>

<div class="card"><h3>Quesadilla sencilla</h3><button onclick="agregar('Quesadilla sencilla')">Agregar</button></div>
<div class="card"><h3>Quesadilla con carne</h3><button onclick="agregar('Quesadilla con carne')">Agregar</button></div>

<div class="card"><h3>Volcán</h3><button onclick="agregar('Volcán')">Agregar</button></div>
<div class="card"><h3>Gringa</h3><button onclick="agregar('Gringa')">Agregar</button></div>
<div class="card"><h3>Lonche</h3><button onclick="agregar('Lonche')">Agregar</button></div>

<div class="card"><h3>Agua</h3>
<select id="saborAgua"></select>
<button onclick="agregar('Agua')">Agregar</button>
</div>

</div>

<br>

<button onclick="abrirForm()">Terminar ✔️</button>

<button onclick="activarAdmin()" style="position:fixed;bottom:10px;right:10px;">⚙️</button>

<!-- FORM -->
<div id="formulario">
<div class="box">
<input id="nombre" placeholder="Nombre">
<button onclick="enviar()">Continuar</button>
</div>
</div>

<!-- PAGO -->
<div id="pantallaPago">
<div class="box">

<h3>Transferencia</h3>

<button onclick="confirmarPedido()">Enviar WhatsApp</button>

</div>
</div>

<!-- ADMIN -->
<div id="panelAdmin" class="admin">

<h3>ADMIN</h3>

<button onclick="cambiarPassword()">Cambiar contraseña</button>
<button onclick="agregarProducto()">Agregar producto</button>
<button onclick="ponerPromo()">Poner promo</button>
<button onclick="agregarAgua()">Agregar agua</button>

<hr>

<div id="listaAdmin"></div>
<div id="adminAguas"></div>

</div>

</body>
</html>
