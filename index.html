<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tacos Milo 🌮</title>

<script>
let carrito = [];

let precios = {
    "Pastor": 18,
    "Chorizo": 18,
    "Bistec": 18,
    "Suadero": 18,
    "Tripa": 24,
    "Coca 250ml": 24
};

function actualizarCarrito() {
    let lista = document.getElementById("lista");
    let total = document.getElementById("total");

    lista.innerHTML = "";

    let suma = 0;
    let contador = {};

    carrito.forEach(t => {
        contador[t] = (contador[t] || 0) + 1;
    });

    for (let t in contador) {
        let cantidad = contador[t];
        let precio = precios[t] * cantidad;
        suma += precio;

        lista.innerHTML += `
            <div style="margin:5px;">
                ${cantidad} de ${t} - $${precio}
                <button onclick="quitar('${t}')">Quitar</button>
            </div>
        `;
    }

    total.innerText = "Total: $" + suma;
}

function agregar(taco) {
    carrito.push(taco);
    actualizarCarrito();
}

function quitar(taco) {
    let index = carrito.indexOf(taco);
    if (index !== -1) {
        carrito.splice(index, 1);
    }
    actualizarCarrito();
}

function terminar() {
    if (carrito.length === 0) {
        alert("No has pedido nada 😅");
        return;
    }

    let nombre = prompt("¿Cuál es tu nombre?");
    if (!nombre) nombre = "Cliente";

    let tipo = prompt("¿Para llevar o aquí? (llevar/aquí)");
    if (!tipo) tipo = "No especificado";

    let contador = {};
    let total = 0;

    carrito.forEach(t => {
        contador[t] = (contador[t] || 0) + 1;
    });

    let texto = "🌮 TACOS MILO%0A%0A";
    texto += "Cliente: " + nombre + "%0A";
    texto += "Pedido: " + tipo + "%0A%0A";

    for (let t in contador) {
        let cant = contador[t];
        let precio = precios[t] * cant;
        total += precio;

        texto += "- " + cant + " de " + t + " ($" + precio + ")%0A";
    }

    texto += "%0ATotal: $" + total;

    let numero = "5213321310169";
    let url = "https://wa.me/" + numero + "?text=" + texto;

    window.open(url, "_blank");
}
</script>

</head>

<body style="background:black;color:white;text-align:center;font-family:Arial;padding:10px;">

<h1 style="color:yellow;">🌮 TACOS MILO</h1>

<div id="lista" style="margin:15px;"></div>
<h2 id="total">Total: $0</h2>

<hr>

<div style="display:flex;flex-wrap:wrap;justify-content:center;gap:15px;">

    <div style="background:#222;padding:15px;border-radius:10px;width:160px;">
        <h3>Pastor - $18</h3>
        <img src="pastor.jpg" width="120"><br><br>
        <button onclick="agregar('Pastor')">Agregar</button>
    </div>

    <div style="background:#222;padding:15px;border-radius:10px;width:160px;">
        <h3>Chorizo - $18</h3>
        <img src="chorizo.jpg" width="120"><br><br>
        <button onclick="agregar('Chorizo')">Agregar</button>
    </div>

    <div style="background:#222;padding:15px;border-radius:10px;width:160px;">
        <h3>Bistec - $18</h3>
        <img src="bistec.jpg" width="120"><br><br>
        <button onclick="agregar('Bistec')">Agregar</button>
    </div>

    <div style="background:#222;padding:15px;border-radius:10px;width:160px;">
        <h3>Suadero - $18</h3>
        <img src="suadero.jpg" width="120"><br><br>
        <button onclick="agregar('Suadero')">Agregar</button>
    </div>

    <div style="background:#222;padding:15px;border-radius:10px;width:160px;">
        <h3>Tripa - $24</h3>
        <img src="tripa.jpg" width="120"><br><br>
        <button onclick="agregar('Tripa')">Agregar</button>
    </div>

    <div style="background:#222;padding:15px;border-radius:10px;width:160px;">
        <h3>Coca 250ml - $24</h3>
        <img src="coca.jpg" width="120"><br><br>
        <button onclick="agregar('Coca 250ml')">Agregar</button>
    </div>

</div>

<br><br>

<button onclick="terminar()" style="background:green;color:white;padding:15px;font-size:18px;border-radius:10px;">
    Terminar pedido ✔️
</button>

</body>
</html>
