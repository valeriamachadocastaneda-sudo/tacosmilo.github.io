<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tacos Milo 🌮</title>

<style>
body {
    background:black;
    color:white;
    font-family:Arial;
    text-align:center;
}

.card {
    background:#222;
    padding:15px;
    border-radius:10px;
    width:160px;
}

button {
    padding:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

#formulario {
    display:none;
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.9);
    justify-content:center;
    align-items:center;
}

.form-box {
    background:#333;
    padding:20px;
    border-radius:15px;
    width:90%;
    max-width:300px;
}

input, select {
    width:90%;
    padding:10px;
    margin:10px;
    border-radius:8px;
    border:none;
}
</style>

<script>
let carrito=[];

let precios={
"Pastor":18,
"Chorizo":18,
"Bistec":18,
"Suadero":18,
"Tripa":24,
"Volcán":30,
"Quesadilla sencilla":25,
"Quesadilla con carne":35,
"Lonche":50,
"Agua litro":25,
"Coca":24
};

function agregar(p){
carrito.push(p);
actualizar();
}

function quitar(p){
let i=carrito.indexOf(p);
if(i!=-1) carrito.splice(i,1);
actualizar();
}

function actualizar(){
let lista=document.getElementById("lista");
let total=0;
let cont={};

lista.innerHTML="";

carrito.forEach(x=>cont[x]=(cont[x]||0)+1);

for(let x in cont){
let precio=precios[x]*cont[x];
total+=precio;

lista.innerHTML+=`
<div>
${cont[x]} de ${x} - $${precio}
<button onclick="quitar('${x}')">❌</button>
</div>`;
}

document.getElementById("total").innerText="Total: $"+total;
}

function abrirForm(){
if(carrito.length==0){
alert("No has pedido nada 😅");
return;
}
document.getElementById("formulario").style.display="flex";
}

function tipoCambio(){
let tipo=document.getElementById("tipo").value;
let hora=document.getElementById("hora");

if(tipo=="Para comer aquí"){
hora.style.display="block";
}else{
hora.style.display="none";
}
}

function enviar(){
let nombre=document.getElementById("nombre").value||"Cliente";
let tipo=document.getElementById("tipo").value;
let hora=document.getElementById("hora").value;

let cont={},total=0;

carrito.forEach(x=>cont[x]=(cont[x]||0)+1);

let texto="🌮 TACOS MILO\n\n";
texto+="Cliente: "+nombre+"\n";
texto+="Tipo: "+tipo+"\n";

if(tipo=="Para comer aquí"){
texto+="Hora de llegada: "+hora+"\n";
}

texto+="\nPedido:\n";

for(let x in cont){
let precio=precios[x]*cont[x];
total+=precio;
texto+="- "+cont[x]+" de "+x+" ($"+precio+")\n";
}

texto+="\nTotal: $"+total;

let url="https://wa.me/5213321310169?text="+encodeURIComponent(texto);
window.open(url,"_blank");
}
</script>

</head>

<body>

<h1 style="color:yellow;">🌮 TACOS MILO</h1>

<div id="lista"></div>
<h2 id="total">Total: $0</h2>

<hr>

<div style="display:flex;flex-wrap:wrap;justify-content:center;gap:15px;">

<div class="card">
<h3>Pastor</h3>
<img src="pastor.jpg" width="120"><br><br>
<button onclick="agregar('Pastor')">Agregar</button>
</div>

<div class="card">
<h3>Chorizo</h3>
<img src="chorizo.jpg" width="120"><br><br>
<button onclick="agregar('Chorizo')">Agregar</button>
</div>

<div class="card">
<h3>Bistec</h3>
<img src="bistec.jpg" width="120"><br><br>
<button onclick="agregar('Bistec')">Agregar</button>
</div>

<div class="card">
<h3>Suadero</h3>
<img src="suadero.jpg" width="120"><br><br>
<button onclick="agregar('Suadero')">Agregar</button>
</div>

<div class="card">
<h3>Tripa</h3>
<img src="tripa.jpg" width="120"><br><br>
<button onclick="agregar('Tripa')">Agregar</button>
</div>

<div class="card">
<h3>Volcán</h3>
<button onclick="agregar('Volcán')">Agregar</button>
</div>

<div class="card">
<h3>Quesadilla sencilla</h3>
<button onclick="agregar('Quesadilla sencilla')">Agregar</button>
</div>

<div class="card">
<h3>Quesadilla con carne</h3>
<button onclick="agregar('Quesadilla con carne')">Agregar</button>
</div>

<div class="card">
<h3>Lonche</h3>
<button onclick="agregar('Lonche')">Agregar</button>
</div>

<div class="card">
<h3>Agua litro</h3>
<img src="agua.jpg" width="120"><br><br>
<button onclick="agregar('Agua litro')">Agregar</button>
</div>

<div class="card">
<h3>Coca</h3>
<img src="coca.jpg" width="120"><br><br>
<button onclick="agregar('Coca')">Agregar</button>
</div>

</div>

<br><br>

<button onclick="abrirForm()" style="background:green;color:white;font-size:18px;">
Terminar pedido ✔️
</button>

<!-- FORMULARIO -->
<div id="formulario">
<div class="form-box">

<h2>Finalizar pedido</h2>

<input id="nombre" placeholder="Tu nombre">

<select id="tipo" onchange="tipoCambio()">
<option>Para llevar</option>
<option>Para comer aquí</option>
</select>

<!-- SELECTOR BONITO DE HORA -->
<select id="hora" style="display:none;">
<option>7:00 pm</option>
<option>7:15 pm</option>
<option>7:30 pm</option>
<option>7:45 pm</option>
<option>8:00 pm</option>
<option>8:15 pm</option>
<option>8:30 pm</option>
<option>8:45 pm</option>
<option>9:00 pm</option>
<option>9:15 pm</option>
<option>9:30 pm</option>
</select>

<br>
<button onclick="enviar()" style="background:green;color:white;">
Enviar a WhatsApp
</button>

<br><br>
<button onclick="document.getElementById('formulario').style.display='none'">
Cancelar
</button>

</div>
</div>

</body>
</html>
